<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikshey Eyewear Face Scanner V5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Inter,sans-serif;margin:0;background:#0f0f0f;color:#fff}
.app{max-width:420px;margin:auto;padding:18px}
.progress{height:4px;background:#25D366;width:0%;margin-bottom:16px}
.card{background:#1c1c1c;padding:16px;border-radius:14px;margin-bottom:14px}
.btn{width:100%;padding:14px;border:none;border-radius:30px;background:#25D366;color:#fff;font-size:15px;cursor:pointer}
.small{font-size:12px;color:#aaa}
.badge{font-size:12px;color:#25D366;margin-top:6px}
img{width:100%;border-radius:10px;margin-bottom:10px}
.input{width:100%;padding:12px;border-radius:10px;border:none;margin-bottom:10px}
</style>
</head>

<body>
<div class="app">
<div class="progress" id="progress"></div>

<h2>🕶 Mikshey Eyewear Scanner</h2>
<p class="small">Scan → Get styles → Auto order system</p>

<!-- LEAD CAPTURE -->
<div id="leadStep">
  <input class="input" id="name" placeholder="Enter your name">
  <input class="input" id="phone" placeholder="WhatsApp number">
  <button class="btn" onclick="startApp()">Start Scan</button>
</div>

<!-- CAMERA -->
<div id="cameraStep" style="display:none">
  <video id="video" autoplay></video>
  <button class="btn" onclick="captureFace()">Scan My Face</button>
</div>

<!-- RESULTS -->
<div id="results" style="display:none"></div>

</div>

<script>
const shapes=['Round','Square','Oval','Heart','Diamond'];

const products=[
  {name:'Aviator Elite',shape:['Square','Oval'],price:'₹899',img:'https://via.placeholder.com/400x250',rating:'4.8',sold:'320'},
  {name:'Urban Retro',shape:['Square','Diamond'],price:'₹799',img:'https://via.placeholder.com/400x250',rating:'4.6',sold:'210'},
  {name:'Sharp Edge Pro',shape:['Round','Oval'],price:'₹999',img:'https://via.placeholder.com/400x250',rating:'4.9',sold:'540'}
];

let state={};

function startApp(){
  const name=document.getElementById('name').value;
  const phone=document.getElementById('phone').value;

  // VALIDATION
  if(!name || !phone){
    alert('Enter details');
    return;
  }

  // STRICT PHONE VALIDATION (exactly 10 digits)
  const phoneRegex = /^[0-9]{10}$/;
  if(!phoneRegex.test(phone)){
    alert('Enter a valid 10-digit phone number');
    return;
  }

  state.name=name;
  state.phone=phone;

  // SAVE LEAD TO GOOGLE SHEETS
  fetch("https://script.google.com/macros/s/AKfycbzzmgD55l89VROAscDc7_20O9L3VXEFrxekoyUNBS0R0dofxKzpxeNmutJU2n8VhrV_HA/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name,
      phone: phone,
      time: new Date().toISOString()
    })
  });

  document.getElementById('leadStep').style.display='none';
  document.getElementById('cameraStep').style.display='block';

  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>{
    document.getElementById('video').srcObject=stream;
  });
}

function detectFaceShape(){
  return shapes[Math.floor(Math.random()*shapes.length)];
}

function captureFace(){
  state.shape=detectFaceShape();
  showResults();
}

function showResults(){
  document.getElementById('cameraStep').style.display='none';
  const res=document.getElementById('results');
  res.style.display='block';

  let matched=products.filter(p=>p.shape.includes(state.shape));
  if(matched.length===0) matched=products;

  res.innerHTML=`<p class="small">Hey ${state.name}, your face shape is <b>${state.shape}</b></p>`;

  matched.forEach((p,i)=>{
    const msg=encodeURIComponent(`Hey, I'm ${state.name}. I used Mikshey Scanner. I want ${p.name}`);

    res.innerHTML+=`
      <div class="card">
        <img src="${p.img}" />
        <h3>${i==0?'🔥 Best Match':'Top Pick'}</h3>
        <p>${p.name} — ${p.price}</p>
        <div class="badge">⭐ ${p.rating} | ${p.sold}+ sold</div>
        <p class="small">Perfect for your ${state.shape}</p>
        <button class="btn" onclick="trackClick('${p.name}');window.open('https://wa.me/${state.phone}?text=${msg}')">Buy Now</button>
      </div>
    `;
  });
}

// TRACK CLICKS
function trackClick(product){
  let clicks=JSON.parse(localStorage.getItem('clicks')||'[]');
  clicks.push({product,time:new Date()});
  localStorage.setItem('clicks',JSON.stringify(clicks));
}

</script>
</body>
</html>
